name: Feature Request
description: Suggest a new feature, quest, recipe, or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      placeholder: Describe your idea...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this improve the modpack?
      placeholder: Explain the benefit for progression, balance, exploration, or immersion.
    validations:
      required: true
